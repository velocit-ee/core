#cloud-config
autoinstall:
  version: 1

  locale: en_US.UTF-8
  keyboard:
    layout: us

  # Network — static IP using a wildcard match so any ethernet NIC works.
  # Covers ens33 (VMware), enp3s0 (PCIe), eno1 (embedded), etc.
  network:
    version: 2
    ethernets:
      mainnic:
        match:
          name: "en*"
        dhcp4: false
        addresses:
          - ${TARGET_IP}/${TARGET_PREFIX}
        routes:
          - to: default
            via: ${TARGET_GATEWAY}
        nameservers:
          addresses:
            - ${TARGET_DNS}

  # Storage — simple LVM layout on the target disk.
  # Using layout (not config) to avoid conflicting directives.
  storage:
    layout:
      name: lvm
      match:
        path: ${TARGET_DISK}

  # Identity — username/password (password required even with SSH keys).
  identity:
    hostname: ${TARGET_HOSTNAME}
    username: ubuntu
    password: "${TARGET_PASSWORD_HASH}"

  # SSH — key-only login.
  ssh:
    install-server: true
    allow-pw: false
    authorized-keys:
      - ${TARGET_SSH_PUBLIC_KEY}

  packages:
    - curl
    - python3

  timezone: ${TARGET_TIMEZONE}

  # No additional snaps.
  snaps: []

  # No proxy.
  proxy: ""

  # Skip any remaining interactive screens.
  interactive-sections: []

  late-commands:
    # Mark provisioning complete and signal VME seed stack.
    - echo 'VME provisioning complete' > /target/etc/vme-provisioned
    - curl -sf http://${SEED_IP}/vme-provision-complete || true
    # Power off so VME detects completion.
    - shutdown -h now
