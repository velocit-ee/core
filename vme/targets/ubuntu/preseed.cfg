# Ubuntu Server unattended cloud-init autoinstall (20.04+)
# Delivered via nocloud-net datasource from nginx at /cloud-init/
# Values are templated by VME at deploy time from vme-config.yml.
#
# For Ubuntu 22.04+ the standard approach is autoinstall via cloud-init,
# not the legacy d-i preseed format.  This file is a cloud-init user-data.
# Filename: user-data  (delivered at ${nginx}/cloud-init/user-data)
# Companion: meta-data (empty file at ${nginx}/cloud-init/meta-data)

#cloud-config
autoinstall:
  version: 1

  # Locale and keyboard.
  locale: en_US.UTF-8
  keyboard:
    layout: us

  # Network — static IP sourced from vme-config.yml.
  network:
    version: 2
    ethernets:
      ${TARGET_NIC}:
        dhcp4: false
        addresses:
          - ${TARGET_IP}/${TARGET_PREFIX}
        gateway4: ${TARGET_GATEWAY}
        nameservers:
          addresses:
            - ${TARGET_DNS}

  # Storage — wipe and partition the target disk.
  storage:
    layout:
      name: lvm
    config:
      - type: disk
        id: disk0
        path: ${TARGET_DISK}
        wipe: superblock-recursive
        preserve: false
        ptable: gpt
        grub_device: true
      - type: partition
        id: part-efi
        device: disk0
        size: 512M
        flag: boot
        grub_device: true
      - type: partition
        id: part-root
        device: disk0
        size: -1
      - type: format
        id: fmt-efi
        fstype: fat32
        volume: part-efi
      - type: format
        id: fmt-root
        fstype: ext4
        volume: part-root
      - type: mount
        id: mount-root
        device: fmt-root
        path: /
      - type: mount
        id: mount-efi
        device: fmt-efi
        path: /boot/efi

  # Identity — hostname and root/admin account.
  identity:
    hostname: ${TARGET_HOSTNAME}
    username: ubuntu
    # password is a hashed string — VME generates it at deploy time.
    password: ${TARGET_PASSWORD_HASH}

  # SSH — enable and inject the operator key.
  ssh:
    install-server: true
    allow-pw: false
    authorized-keys:
      - ${TARGET_SSH_PUBLIC_KEY}

  # Minimal package set — no desktop, no bloat.
  packages:
    - openssh-server
    - curl
    - wget
    - python3
    - python3-pip

  # Timezone.
  timezone: Europe/Berlin

  # No interactive prompts.
  interactive-sections: []

  # Power off after install so VME can detect completion.
  late-commands:
    - "echo 'VME provisioning complete' > /target/etc/vme-provisioned"
    - shutdown -h now
