# Proxmox VE unattended answer file (proxmox-ve 8.x / 9.x)
# Values are templated by VME at deploy time from vme-config.yml.
# See: https://pve.proxmox.com/wiki/Automated_Installation

[global]
keyboard = "en-us"
country = "de"
fqdn = "${TARGET_HOSTNAME}.${TARGET_DOMAIN}"
root-password = "${TARGET_ROOT_PASSWORD}"
mailto = "${TARGET_EMAIL}"
timezone = "${TARGET_TIMEZONE}"

[disk-setup]
filesystem = "ext4"
disk-list = ["${TARGET_DISK}"]
swapsize = 0

[network]
source = "from-answer"
cidr = "${TARGET_IP}/${TARGET_PREFIX}"
dns = "${TARGET_DNS}"
gateway = "${TARGET_GATEWAY}"
filter = "${TARGET_NIC}"
