# VME nginx — serves iPXE chainload files and OS images
# The /srv/images bind-mount is the host image cache directory (set in vme-config.yml).
# The /srv/ipxe bind-mount contains the built iPXE binaries and boot scripts.

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # Increase timeouts for large ISO transfers.
    send_timeout        600s;
    proxy_read_timeout  600s;

    server {
        listen 80;
        server_name _;

        root /srv;
        autoindex on;

        # iPXE bootloader binaries and scripts (from ipxe build container output).
        location /ipxe/ {
            alias /srv/ipxe/;
        }

        # OS images — served from the host cache directory (bind-mounted at /srv/images).
        location /images/ {
            alias /srv/images/;
        }

        # Catch-all: serve anything under /srv.
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
