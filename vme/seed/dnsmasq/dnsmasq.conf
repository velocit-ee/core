# VME dnsmasq — DHCP + TFTP for PXE provisioning
# All values are substituted at runtime by docker-compose via environment variables.
# Do not hardcode IPs or interface names here.

# Bind only to the provisioning interface.
interface=${PROVISIONING_INTERFACE}
bind-interfaces
no-resolv
no-hosts

# DHCP range and lease time (set in vme-config.yml).
dhcp-range=${DHCP_RANGE_START},${DHCP_RANGE_END},${DHCP_LEASE_TIME}

# TFTP root — nginx serves files from the same bind-mount.
enable-tftp
tftp-root=/tftp

# ---------------------------------------------------------------------------
# Legacy BIOS vs UEFI detection via DHCP option 93 (client-arch)
#
# Option 93 values (RFC 4578):
#   0  = x86 BIOS (IA32)
#   6  = EFI IA32
#   7  = EFI x86-64
#   9  = EFI x86-64 (alternative tag used by some UEFI firmware)
#  11  = EFI ARM64
# ---------------------------------------------------------------------------

# x86 BIOS legacy clients → iPXE undionly chainloader
dhcp-match=bios-client,option:client-arch,0
dhcp-boot=tag:bios-client,undionly.kpxe,,${SEED_IP}

# EFI IA32
dhcp-match=efi32-client,option:client-arch,6
dhcp-boot=tag:efi32-client,ipxe.efi,,${SEED_IP}

# EFI x86-64 (both tags)
dhcp-match=efi64-client,option:client-arch,7
dhcp-boot=tag:efi64-client,ipxe.efi,,${SEED_IP}

dhcp-match=efi64-client2,option:client-arch,9
dhcp-boot=tag:efi64-client2,ipxe.efi,,${SEED_IP}

# EFI ARM64
dhcp-match=efiarm64-client,option:client-arch,11
dhcp-boot=tag:efiarm64-client,ipxe.efi,,${SEED_IP}

# Fallback for clients that don't send option 93 — assume legacy BIOS.
dhcp-boot=undionly.kpxe,,${SEED_IP}

# Log DHCP activity (visible via docker compose logs).
log-dhcp
