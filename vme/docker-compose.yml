---
# VME seed stack
# Never run docker compose directly — always use `vme deploy`.
# The CLI renders templates into ./run/ and passes environment variables
# before starting this stack.

services:

  # -------------------------------------------------------------------------
  # iPXE builder — runs once, copies binaries to the ipxe_bins volume.
  # -------------------------------------------------------------------------
  ipxe-build:
    build:
      context: ./seed/ipxe
      dockerfile: Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    volumes:
      - ipxe_bins:/out
      - ./run/ipxe/boot.ipxe:/boot.ipxe:ro
    command: sh -c "cp /undionly.kpxe /ipxe.efi /boot.ipxe /out/"
    restart: "no"

  # -------------------------------------------------------------------------
  # dnsmasq — DHCP + TFTP
  # Mounts the rendered dnsmasq.conf from ./run/ (written by the CLI).
  # -------------------------------------------------------------------------
  dnsmasq:
    image: dockurr/dnsmasq:latest
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./run/dnsmasq/dnsmasq.conf:/etc/dnsmasq.conf:ro
      - ipxe_bins:/tftp:ro
    depends_on:
      ipxe-build:
        condition: service_completed_successfully
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # nginx — serves iPXE scripts and OS images
  # Mounts rendered boot.ipxe and install configs from ./run/.
  # OS images are bind-mounted from the host cache — nothing is copied in.
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    network_mode: host
    volumes:
      - ./seed/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ipxe_bins:/srv/ipxe:ro
      - ./run/cloud-init:/srv/cloud-init:ro
      - ${IMAGE_CACHE_DIR:-~/.velocitee/cache/images}:/srv/images:ro
    depends_on:
      ipxe-build:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  ipxe_bins:
