# VME configuration file — copy to vme-config.yml and fill in your values.
# All fields shown here are recognised by `vme deploy`.
# The wizard (vme setup) writes this file for you interactively.

# ── Backend selection ───────────────────────────────────────────────────────
# Which provisioning backend to use. Default is 'builtin' — VME runs its own
# dnsmasq + iPXE + nginx seed stack on this machine. Set to 'maas' to hand
# provisioning off to an existing Canonical MAAS deployment instead (you'll
# also need MAAS_URL + MAAS_API_KEY in the environment).
backend: builtin

# Optional MAAS settings — only consulted when backend: maas.
# maas:
#   url: "https://maas.lab.local:5240"   # or set via MAAS_URL env var
#   # api_key kept out of config files — set via MAAS_API_KEY env var
#   # system_id: "abc123"                # pin a specific MAAS machine; otherwise
#                                         # we look up by target.hostname or target.mac
#   # distro_series: "noble"             # override the series mapped from target.os

# ── Seed machine ────────────────────────────────────────────────────────────
# (only used when backend: builtin)

# Network interface on the seed machine connected to the provisioning network.
provisioning_interface: eth1

# IP assigned to the provisioning interface on the seed machine.
# Must be on the same subnet as dhcp_range_start/end.
# VME assigns this automatically if the interface has no IP yet.
seed_ip: 192.168.100.1

# DHCP range handed out to PXE clients.
dhcp_range_start: 192.168.100.100
dhcp_range_end:   192.168.100.200
dhcp_lease_time:  12h

# Where OS images are cached on the seed machine.
# Defaults to ~/.velocitee/cache/images/ if omitted.
# image_cache_dir: ~/.velocitee/cache/images/

# ── Target machine ───────────────────────────────────────────────────────────

target:
  hostname: node-01
  os: proxmox-ve        # proxmox-ve | ubuntu-server

  # Static IP configured inside the installed OS.
  ip:      192.168.100.10
  prefix:  24            # subnet prefix length
  gateway: 192.168.100.1
  netmask: 255.255.255.0
  dns:     8.8.8.8

  # Disk to install to on the target machine.
  disk: /dev/sda

  # SSH public key injected into the provisioned machine.
  ssh_public_key: "ssh-ed25519 AAAA... user@host"

# ── Output ───────────────────────────────────────────────────────────────────

# Where VME writes the handoff manifest after a successful deployment.
manifest_output_dir: ./manifests/output/
