name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r vme/requirements.txt -r vme/requirements-dev.txt
          # Shared + VNE deps. Listed inline because shared/ is imported by
          # both VME and VNE tests; one dep block keeps CI simple.
          pip install pydantic jsonschema pyyaml typer requests passlib \
                      tenacity structlog

      - name: Lint (ruff)
        # Cover VME, the shared library, and VNE — the new code we added in
        # the engine + renderer abstractions.
        run: ruff check vme/cli/ shared/ vne/ --select E,F,W --ignore E501,E402

      - name: Test VME
        run: |
          cd vme
          python -m pytest --tb=short -q

      - name: Test shared
        run: |
          PYTHONPATH=. python -m pytest shared/tests/ --tb=short -q
